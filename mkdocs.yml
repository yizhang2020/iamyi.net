site_name: iamyi.net
site_url: https://iamyi.net
site_description: Personal profile and writings about security.
site_author: Yi Zhang
repo_url: https://github.com/yizhang2020/iamyi.net
repo_name: iamyi.net

copyright: Copyright &copy; 2026 Yi Zhang &mdash; Unless noted otherwise, content is licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.

hooks:
  - mkdocs_hooks.py 

# Extra paths for `mkdocs serve` livereload (in addition to docs/ and mkdocs.yml).
# We watch `overrides/` for theme templates; `tools/` and hook files are not watched to avoid
# noisy rebuilds when editing generators. For those, edit mkdocs.yml or use start.sh’s restart.

watch:
  - overrides 

extra_css:
  - stylesheets/tables.css 

docs_dir: docs
site_dir: site

validation:
  nav:
    omitted_files: ignore
    absolute_links: ignore

plugins:
  - awesome-pages
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
      enable_git_follow: false

# Authoring aid only; not a published page.
exclude_docs: |
  incidents/_template-incident-note.md
  includes/latest-writing.md

theme:
  name: material
  custom_dir: overrides
  # Teal + amber: calm, readable, a bit more “personal site” than default indigo.
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - meta 
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences
  - pymdownx.highlight  

nav:
  - Home: index.md  
  - Topics:
      - GenAI & ML security:
          - topics/genai-ml-security/index.md
          - "Framing secure GenAI and ML": topics/genai-ml-security/0-introduction-framing-secure-genai-and-ml.md
          - "1. GenAI Application Taxonomy and Architecture": topics/genai-ml-security/1-genai-application-taxonomy-and-architecture.md
          - "2. GenAI vs Traditional Applications": topics/genai-ml-security/2-genai-vs-traditional-applications.md
          - "3. Core GenAI Programming Logic and Attack Surface": topics/genai-ml-security/3-core-genai-programming-logic-and-attack-surface.md
          - "4. GenAI Attack Techniques in Context": topics/genai-ml-security/4-genai-attack-techniques-in-context.md
          - "5. GenAI / ML Fundamentals for Security Engineers": topics/genai-ml-security/5-genai-ml-fundamentals-for-security-engineers.md
          - "6. Securing the GenAI Application Lifecycle": topics/genai-ml-security/6-securing-the-genai-application-lifecycle.md
          - "7. MLSecOps": topics/genai-ml-security/7-mlsecops.md
          - "8. Conclusion — Principles and the Road Ahead": topics/genai-ml-security/8-conclusion-principles-and-the-road-ahead.md
          - "9. Secure GenAI / ML — Executive Summary": topics/genai-ml-security/9-secure-genai-ml-executive-summary.md
          - "10. Appendix — Additional Resources": topics/genai-ml-security/10-appendix-additional-resources.md
      - Security code review:
          - topics/security-code-review/index.md
          - "Preface - Why Security Code Review Skill Still Matters in the Age of AI": topics/security-code-review/0-preface-why-security-code-review-skill-still-matters.md
          - "Part I - Build the Reviewer Mindset":
              - "1. Define Security Code Review": topics/security-code-review/1-what-security-code-review-is.md
              - "2. Think Like a Security Reviewer": topics/security-code-review/2-how-to-think-like-a-security-reviewer.md
          - "Part II - Apply Security Review Methodology":
              - "3. System Decomposition Methodology": topics/security-code-review/3-system-decomposition-methodology.md
          - "Part III - Review Code-Level Vulnerabilities":
              - "4. Review Code-Level Vulnerabilities": topics/security-code-review/4-review-code-level-vulnerabilities.md
          - "Part IV - Scale With AI Assistance":
              - "5. Use AI to Assist Human Review": topics/security-code-review/5-use-ai-to-assist-human-review.md
              - "6. Run Fully Automated LLM Review": topics/security-code-review/6-run-fully-automated-llm-review.md
              - "7. Control the Risks of AI Review": topics/security-code-review/7-control-the-risks-of-ai-review.md
          - "Part V - Grow Capability and Governance":
              - "8. Train Security Reviewers": topics/security-code-review/8-train-security-reviewers.md
              - "9. Build an Internal Review Program": topics/security-code-review/9-build-an-internal-review-program.md
          - "Conclusion - Build Defensible Confidence": topics/security-code-review/conclusion-from-uncertainty-to-defensible-confidence.md
          - "Reference - Secure Coding in Practice": topics/security-code-review/secure-coding-in-practice.md
  - Security musings:
      - Browse: security-musings/index.md
      - "... | flat | glob=security-musings/**/*.md"
  - Incidents & trends:
      - incidents/index.md
  - About:
      - Whoami: about/whoami.md
