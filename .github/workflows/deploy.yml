name: Deploy Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Build must upload a workflow artifact; deploy must read it and publish to Pages.
permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install -r requirements.txt

      - run: |
          python tools/gen_cases_index.py || true

      - run: |
          mkdocs build --clean

      - name: Verify static site output
        run: |
          test -f site/index.html
          test -s site/index.html
          echo "Built site root:" && ls -la site | head -20

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
